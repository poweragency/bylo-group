<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
    <radialGradient id="glow" cx="100%" cy="0%" r="80%">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#fbbf24" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M 80 0 L 0 0 0 80" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.03"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <text x="80" y="200" font-family="Inter, system-ui, sans-serif" font-weight="700" font-size="22" fill="#fbbf24" letter-spacing="6">TOMMY BY · GRUPPO BYLO</text>

  <g transform="translate(80, 280)">
    <text x="0" y="0" font-family="Inter, system-ui, sans-serif" font-weight="900" font-size="100" fill="#fbbf24">Tommy</text>
    <text x="320" y="0" font-family="Inter, system-ui, sans-serif" font-weight="300" font-size="80" fill="#ffffff" letter-spacing="6">BY</text>
  </g>

  <text x="80" y="380" font-family="Inter, system-ui, sans-serif" font-weight="600" font-size="38" fill="#ffffff">Officina e carrozzeria multimarche</text>

  <text x="80" y="430" font-family="Inter, system-ui, sans-serif" font-weight="400" font-size="26" fill="#aaaaaa">auto e moto, qualsiasi modello — Milano e Mazzo di Rho.</text>

  <text x="80" y="475" font-family="Inter, system-ui, sans-serif" font-weight="400" font-size="22" fill="#888888">Revisioni · Tagliandi · Carrozzeria · Verniciatura a forno ad acqua</text>

  <line x1="80" y1="520" x2="200" y2="520" stroke="#fbbf24" stroke-width="3"/>
  <text x="80" y="565" font-family="Inter, system-ui, sans-serif" font-weight="500" font-size="20" fill="#aaaaaa">tommy.bylogroup.it</text>
</svg>
